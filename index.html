<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Image Resizer - 图片尺寸调整与裁剪工具"><meta property="og:title" content="Image Resizer"><title>Image Resizer</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:1000px;margin:0 auto;padding:24px}.upload-zone{background:#161b22;border:2px dashed #30363d;border-radius:12px;padding:40px;text-align:center;cursor:pointer;margin-bottom:20px}.upload-zone:hover{border-color:#58a6ff}.controls{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px;display:none}.controls .row{display:flex;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap}.controls label{font-size:13px;color:#8b949e;min-width:70px}.controls input[type=number]{width:100px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:6px 10px;border-radius:4px;font-size:13px}.controls input[type=checkbox]{margin-right:4px}.controls select{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:6px 10px;border-radius:4px;font-size:13px}.preview-area{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}.preview-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;text-align:center}.preview-card img{max-width:350px;max-height:300px;border-radius:4px}.preview-card .info{font-size:12px;color:#8b949e;margin-top:6px}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;margin:4px}.btn:hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff}.preset-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.preset-btns button{background:#21262d;color:#8b949e;border:1px solid #30363d;padding:4px 10px;border-radius:12px;cursor:pointer;font-size:11px}.preset-btns button:hover{color:#58a6ff}</style></head><body><header><h1>📐 Image Resizer</h1><div class="lang-switch"><button class="active" onclick="setLang("zh")">中文</button><button onclick="setLang("en")">EN</button></div></header><div class="container"><input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)"><div class="upload-zone" id="dropZone" onclick="document.getElementById("fileInput").click()"><div style="font-size:48px;margin-bottom:12px">🖼</div><div>点击上传图片</div><div style="font-size:12px;color:#484f58;margin-top:8px">支持 PNG, JPG, WebP, GIF</div></div><div class="controls" id="controls"><div class="row"><label>宽度</label><input type="number" id="resizeW" value="800" min="1" oninput="previewResize()"><label>高度</label><input type="number" id="resizeH" value="600" min="1" oninput="previewResize()"><label><input type="checkbox" id="keepRatio" checked onchange="onRatioChange()"> 保持比例</label></div><div class="row"><label>模式</label><select id="resizeMode" onchange="previewResize()"><option value="fit">适应 (Fit)</option><option value="fill">填充 (Fill)</option><option value="stretch">拉伸 (Stretch)</option></select><label>格式</label><select id="outputFormat"><option value="image/png">PNG</option><option value="image/jpeg">JPEG</option><option value="image/webp">WebP</option></select><label>质量</label><input type="range" id="jpegQuality" min="10" max="100" value="90" style="width:100px"><span id="qLabel" style="font-size:12px;color:#8b949e">90</span></div><div class="preset-btns"><button onclick="setPreset(1920,1080)">1920x1080</button><button onclick="setPreset(1280,720)">1280x720</button><button onclick="setPreset(800,600)">800x600</button><button onclick="setPreset(400,300)">400x300</button><button onclick="setPreset(200,200)">200x200</button><button onclick="setPreset(100,100)">100x100</button></div><div class="row" style="margin-top:8px"><button class="btn btn-primary" onclick="downloadResized()">⬇️ 下载调整后图片</button></div></div><div class="preview-area" id="previewArea"></div></div><script>var lang="zh",originalImg=null,origW=0,origH=0;function setLang(l){lang=l;document.querySelectorAll(".lang-switch button").forEach(function(b,i){b.classList.toggle("active",(i===0&&l==="zh")||(i===1&&l==="en"))})}document.getElementById("jpegQuality").addEventListener("input",function(){document.getElementById("qLabel").textContent=this.value});function handleFile(e){var file=e.target.files[0];if(!file||!file.type.match(/image//))return;var reader=new FileReader();reader.onload=function(ev){var img=new Image();img.onload=function(){originalImg=img;origW=img.width;origH=img.height;document.getElementById("resizeW").value=img.width>1200?1200:img.width;document.getElementById("resizeH").value=Math.round(img.height*(Math.min(1200,img.width)/img.width));document.getElementById("controls").style.display="block";previewResize()};img.src=ev.target.result};reader.readAsDataURL(file)}function onRatioChange(){if(document.getElementById("keepRatio").checked)previewResize()}function setPreset(w,h){document.getElementById("resizeW").value=w;document.getElementById("resizeH").value=h;previewResize()}function previewResize(){if(!originalImg)return;var tw=parseInt(document.getElementById("resizeW").value)||origW;var th=parseInt(document.getElementById("resizeH").value)||origH;var mode=document.getElementById("resizeMode").value;var keepRatio=document.getElementById("keepRatio").checked;var canvas=document.createElement("canvas");var ctx=canvas.getContext("2d");canvas.width=tw;canvas.height=th;var sx=0,sy=0,sw=origW,sh=origH;if(mode==="fit"&&keepRatio){var scale=Math.min(tw/origW,th/origH);var dw=origW*scale,dh=origH*scale;canvas.width=dw;canvas.height=dh;ctx.drawImage(originalImg,0,0,dw,dh)}else if(mode==="fill"&&keepRatio){var scale=Math.max(tw/origW,th/origH);var dw=origW*scale,dh=origH*scale;sx=(dw-tw)/2/scale;sy=(dh-th)/2/scale;sw=tw/scale;sh=th/scale;ctx.drawImage(originalImg,sx,sy,sw,sh,0,0,tw,th)}else{ctx.drawImage(originalImg,0,0,tw,th)}var url=canvas.toDataURL();var preview=document.getElementById("previewArea");preview.innerHTML="<div class="preview-card"><img src=""+url+""><div class="info">"+canvas.width+"x"+canvas.height+"</div></div>";window._resizedCanvas=canvas}function downloadResized(){if(!window._resizedCanvas){alert("请先上传图片");return}var format=document.getElementById("outputFormat").value;var quality=parseInt(document.getElementById("jpegQuality").value)/100;var ext=format==="image/png"?"png":format==="image/webp"?"webp":"jpg";var dataUrl=window._resizedCanvas.toDataURL(format,quality);var a=document.createElement("a");a.href=dataUrl;a.download="resized."+ext;a.click()}</script></body></html>
